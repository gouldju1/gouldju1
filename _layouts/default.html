<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>
<body>

  <a id="skip-to-content" href="#content">Skip to content</a>

  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a class="nav-brand" href="{{ site.github.home_url }}">
        <span class="prompt-symbol">&gt;</span><span class="brand-name">Justin Gould</span><span class="cursor-blink">_</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links" role="list">
        <li><a href="{{ site.github.home_url }}" class="nav-link">Home</a></li>
        <li><a href="{{ site.github.projects_url }}" class="nav-link">Projects</a></li>
        <li><a href="{{ site.github.papers_url }}" class="nav-link">Thought Leadership</a></li>
        <li><a href="{{ site.github.cv_url }}" class="nav-link nav-cta" target="_blank" rel="noopener">Resume</a></li>
      </ul>
    </div>
  </nav>

  <main id="content" role="main">
    {{ content }}
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-prompt"><span class="prompt-symbol">//</span> gouldju1 &mdash; Indianapolis, IN</span>
      <div class="footer-links">
        <a href="mailto:gouldju1@gmail.com">email</a>
        <a href="https://github.com/gouldju1" target="_blank" rel="noopener">github</a>
        <a href="https://www.linkedin.com/in/gouldju1/" target="_blank" rel="noopener">linkedin</a>
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/terminal.js' | relative_url }}" defer></script>
</body>
</html>
